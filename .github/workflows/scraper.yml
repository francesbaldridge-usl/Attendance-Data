name: Weekly Attendance Scrape

on:
  schedule:
    # - cron: '0 9 * * 1'
    - cron: '0 10 * * 5'
  workflow_dispatch:       

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install selenium pandas openpyxl

      - name: Run League One scraper
        run: python L1_attendance_driver.py

      - name: Run Championship scraper
        run: python CH_attendance_driver.py

      - name: Send email with attachments
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          to: frances.baldridge@uslsoccer.com
          from: ${{ secrets.GMAIL_USER }}
          subject: Weekly Attendance Report
          body: 
          attachments: L1_attendance_data.xlsx,CH_attendance_data.xlsx