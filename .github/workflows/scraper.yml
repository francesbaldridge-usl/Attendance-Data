name: Weekly Attendance Scrape

# on:
#   schedule:
#     - cron: '0 10 * * 1'  # 6am EST = 11am UTC, every Monday
#   workflow_dispatch:       # lets you trigger it manually too

on:
  schedule:
    - cron: '5 19 * * 4'  # 2:05pm EST = 7:05pm UTC, every Thursday
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install selenium pandas openpyxl

      - name: Run League One scraper
        run: python L1_attendance_driver.py

      - name: Run Championship scraper
        run: python CH_attendance_driver.py

      - name: Send email with attachments
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          to: frances.baldridge@uslsoccer.com
          from: ${{ secrets.EMAIL_USER }}
          subject: Weekly Attendance Report - ${{ github.run_number }}
          body: League One and Championship attendance data attached.
          attachments: L1_attendance_data.xlsx,CH_attendance_data.xlsx